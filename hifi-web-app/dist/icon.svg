<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Rounded square background -->
  <rect width="192" height="192" rx="32" fill="#1a1a1c"/>
  <!-- Vinyl disc -->
  <circle cx="96" cy="96" r="80" fill="#161616"/>
  <!-- Groove rings -->
  <circle cx="96" cy="96" r="70" fill="none" stroke="#252525" stroke-width="2"/>
  <circle cx="96" cy="96" r="58" fill="none" stroke="#252525" stroke-width="2"/>
  <circle cx="96" cy="96" r="47" fill="none" stroke="#252525" stroke-width="2"/>
  <!-- Centre label -->
  <circle cx="96" cy="96" r="30" fill="#3d2508"/>
  <circle cx="96" cy="96" r="22" fill="#d97706"/>
  <!-- Centre hole -->
  <circle cx="96" cy="96" r="6" fill="#1a1a1c"/>
  <!-- Indicator triangle at 12 o'clock -->
  <polygon points="96,24 103,40 89,40" fill="#d97706"/>
</svg>
